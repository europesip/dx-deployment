      cpu: "100m"
      memory: "64Mi"
  # HAProxy resource allocation
  haproxy:
    requests:
      cpu: "200m"
      memory: "300Mi"
    limits:
      cpu: "200m"
      memory: "300Mi"
  # License Manager resource allocation
  licenseManager:
    requests:
      cpu: "100m"
      memory: "300Mi"
    limits:
      cpu: "100m"
      memory: "300Mi"
  # DAM Kaltura Plugin resource allocation
  damPluginKaltura:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"
  # Prereqs Checker resource allocation
  prereqsChecker:
    requests:
      cpu: "100m"
