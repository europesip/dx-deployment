    # If customLdapSecret is not empty, ldapUser and ldapPassword should be an empty string. If both default credential and secret name are filled it will block the chart from being deployed.
    customLdapSecret: ""
  # Security configuration for Image processor
  imageProcessor:
    # If authenticationKey is not empty, the customImageProcessorSecret below should be an empty string. If both default credential and secret name are filled it will block the chart from being deployed.
