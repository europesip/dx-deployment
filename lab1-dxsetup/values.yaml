# Logging configuration
logging:
  # Core specific logging configuration
  core:
    level: []
    # List of sidecar containers mapping a container name to a file path for a log file to be exposed
    # Each element must consist of a `containerName` and a `logFilePath`, the latter must be located in one of the mounted volumes.
    # The mounted volumes include the path `/opt/HCL/logs` and any custom PVC mountPaths specified in `volumes.core.customPVCs`
    # `logFilePath` can be a file name pattern, use `*` in file path to make generic value. For example `/opt/HCL/logs/*/test.log` or `/opt/HCL/logs/verbosegc.*`
    # Example:
    # customLogSidecarContainers:
    #   - containerName: "trace"
    #     logFilePath: "/opt/HCL/logs/WebSphere_Portal/trace.log"
    customLogSidecarContainers: []
  # Content Composer specific logging configuration
  contentComposer:
    level:
      - "api:server-v1:*=info"
  # DAM Plugin Google Vision specific logging configuration
  damPluginGoogleVision:
    level:
      - "api:server-v1:*=info"
  # Digital Asset Management specific logging configuration
  digitalAssetManagement:
    level:
      - "api:server-v1:*=info"
      - "worker:server-v1:*=info"
  # Image Processor specific logging configuration
  imageProcessor:
    level:
      - "api:server-v1:*=info"
  # Open LDAP specific logging configuration
  openLdap:
    level: []
  # Persistence Pool specific logging configuration
  persistenceConnectionPool:
    level:
      - "pgpool:=info"
  # Persistence Node specific logging configuration
  persistenceNode:
    level:
      - "psql:=info,repmgr:=info"
  # Remote Search specific logging configuration
  remoteSearch:
    level: []
    # List of sidecar containers mapping a container name to a file path for a log file to be exposed
    # Each element must consist of a `containerName` and a `logFilePath`, the latter must be located in /var/profile.
    # `logFilePath` can be a file name pattern, use `*` in file path to make generic value. For example `/var/profile/logs/server1/*/test.log` or `/var/profile/logs/server1/verbosegc.*`
    # Example:
    # customLogSidecarContainers:
    #   - containerName: "trace"
    #     logFilePath: "/var/profile/logs/server1/trace.log"
    customLogSidecarContainers: []
  # Ring API specific logging configuration
  ringApi:
    level:
      - "api:server-v1:*=info"
  # Runtime Controller specific logging configuration
  runtimeController:
    level:
      - "controller:.*=INFO"
      - "controller:com.hcl.dx.*=INFO"
  # License Manager specific logging configuration
  licenseManager:
    level:
      - "license-check:.*=INFO"
      - "license-check:com.hcl.dx.*=INFO"
  # DAM Kaltura Plugin specific logging configuration
  damPluginKaltura:
    level:
      - "api:server-v1:*=info"
  # HAProxy specific logging configuration
  haproxy:
    level:
      - "haproxy:=info"
  # WebEngine specific logging configuration
  webEngine:
    # Valid log levels for all entries: off, fatal, severe, warning, audit, info, config, detail, fine, finer, finest, all
    # 
    # Define log levels for each logger. The following entries specify the logger and the desired level:
    # - "*=info" sets the default log level for all components.
    # - "com.ibm.wps.logging.ExceptionLogger=all" sets the log level for ExceptionLogger. This can be changed to any valid log level.
    # 
    # Example entries for additional loggers (add them below the active ones if needed):
    # - "com.ibm.websphere=finest"
    # - "com.ibm.ejs=warning"
    # - "com.ibm.trace=audit"
    level:
      - "*=info" # Global default log level
      - "com.ibm.wps.logging.ExceptionLogger=all" # ExceptionLogger default level
    # List of sidecar containers mapping a container name to a file path for a log file to be exposed
    # Each element must consist of a `containerName` and a `logFilePath`, the latter must be located in one of the mounted volumes.
    # The mounted volumes include the path `/opt/openliberty/wlp/usr/servers/defaultServer/logs` and any custom PVC mountPaths specified in `volumes.webEngine.customPVCs`
    # `logFilePath` can be a file name pattern, use `*` in file path to make generic value. For example `/opt/openliberty/wlp/usr/servers/defaultServer/logs/*/test.log` or `/opt/openliberty/wlp/usr/servers/defaultServer/logs/verbosegc.*`
    # Example:
    # customLogSidecarContainers:
    #   - containerName: "console-log"
    #     logFilePath: "/opt/openliberty/wlp/usr/servers/defaultServer/logs/console.log"
    customLogSidecarContainers: []
