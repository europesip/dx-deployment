# Affinity and anti-affinity expands the types of constraints you can define
# e.g affinity
# affinity:
#   contentComposer:
#     nodeAffinity:
#       requiredDuringSchedulingIgnoredDuringExecution:
#         nodeSelectorTerms:
#           - matchExpressions:
#               - key: topology.kubernetes.io/zone
#                 operator: In
#                 values:
#                   - antarctica-east1
#                   - antarctica-west1
#       preferredDuringSchedulingIgnoredDuringExecution:
#         - weight: 1
#           preference:
#             matchExpressions:
#               - key: another-node-label-key
#                 operator: In
#                 values:
#                   - another-node-label-value
#     podAffinity:
#       requiredDuringSchedulingIgnoredDuringExecution:
#         - labelSelector:
#             matchExpressions:
#               - key: security
#                 operator: In
#                 values:
#                   - S1
#           topologyKey: topology.kubernetes.io/zone
#     podAntiAffinity:
#       preferredDuringSchedulingIgnoredDuringExecution:
#         - weight: 100
#           podAffinityTerm:
#             labelSelector:
#               matchExpressions:
#                 - key: security
#                   operator: In
#                   values:
#                     - S2
#             topologyKey: topology.kubernetes.io/zone
