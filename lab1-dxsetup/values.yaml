      enabled: false
      # Settings for checking content AI provider. When contentAI.enabled is true, provider will be used.
      provider: "OPEN_AI"
      # Provide the custom AI class which implements com.hcl.workplace.wcm.restv2.ai.IAIGeneration interface in WCM
      # For e.g. className: "com.ai.sample.CustomerAI"
      className: ""
    # Settings for SearchV2 UI configuration
    search:
      # Determines if search ui v2 is enabled or not
      uiV2Enabled: true
      # Determines to which search center any input box redirects by default
      inputRedirectVersion: "v2"
      # Determines which search is used in wcm authoring
      wcmVersion: "v2"
    # The keys and values specified in "customSecrets"  must consist of lower case alphanumeric characters or '-', and must start and end with an alphanumeric character (e.g. 'my-name', or '123-abc')
    # Secrets will be injected as environment variables and mounted as files under /mnt/customSecrets 
    # From there they can be referenced in the server configuration.
    # All key-value pairs in the specified secrets are injected into the Pod as environment variables
    # For reference https://kubernetes.io/docs/tasks/inject-data-application/distribute-credentials-secure/#configure-all-key-value-pairs-in-a-secret-as-container-environment-variables
    # Example secret data:
    #   DB_USERNAME: "myUser"
    #   DB_PASSWORD: "myPassword"
    # 
    # Example configuration:
    #
    # configuration:
    #   webEngine:
    #     customSecrets:
    #       db-credentials: my-custom-db-credentials
    #
    # This will make the environment variables DB_USERNAME and DB_PASSWORD available in the Pod.
    # This will also mount two files in /mnt/customSecrets/db-credentials named "DB_USERNAME" and "DB_PASSWORD"
    customSecrets: {}
    # Secrets that include either certificate (.crt) and key (.key) or only a CA certificate.
    # During startup, the container will populate the keystore with the ID "defaultKeyStore".
    # 
    # To create a secret with a key and certificate:
    # kubectl -n <namespace> create secret tls tls-secret --key="certificate.key" --cert="certificate.crt"
    #
    # To create a secret with only a certificate:
    # kubectl -n <namespace> create secret generic ca-secret --from-file=certificate.ca
    #
    # Example configuration:
    #
    # configuration:
    #   webEngine:
    #     customKeystoreSecrets:
    #       tls-secret-1: tls-secret-1  # Contains first .crt + .key
    #       tls-secret-2: tls-secret-2  # Contains second .crt + .key
    #     customTruststoreSecrets:
    #       ca-secret-1: ca-secret-1    # Contains .crt, .pem, .ca
    #       ca-secret-2: ca-secret-2    # Contains another set of CA certs
    #
    # The secrets defined in customKeystoreSecrets will be processed into the defaultKeyStore.
    # The secrets defined in customTruststoreSecrets will be processed into the defaultTruststore.
    # WARNING: Changes to the keystores and truststores require a restart of the Pod.
    customKeystoreSecrets: {}
    customTruststoreSecrets: {}
    # Web Application Bridge (WAB) configuration
    # Configures whether WAB is enabled/disabled
    wabEnabled: false
incubator:
  # Enable or disable configuration sharing between DX applications
  enableConfigurationSharing: false
  configuration:
    damPluginGoogleVision:
      # DAM Plugin Google Vision Stub Mode returns dummy keywords. It remains false in production
      stubMode: false
    # Digital asset management configurations
    digitalAssetManagement:
      # The renderNewUI configuration below allows users to enable or disable the new UI in DAM.
      renderNewUI: true
      # This configuration allows users to enable or disable the collection sorting dropDown at DAM Landing page
      enableRootCollectionSort: true
    dxPicker:
      # The renderPickerSearch configuration below allows users to switch to search-based DXPicker if set to true.
      renderPickerSearch: false
    persistence:
      # This flag determines, if the database and user creation would be performed by DAM during startup. If the host value is set, then DAM would not consider this flag and skip it.
      dbInitByDam: true
    searchMiddleware:
      contextRoot:
        # Context root of Search Middleware
        api: "/dx/api/search"
        # Context root of Picker UI
        pickerUI: "/dx/ui/search/picker"
      # Version of Search Middleware
      version: "v2"
# Environment variables for different DX Resources.
# Type: Array of objects
# Sample "environment" configuration:
#   environment:
#     pod:
#       haproxy:
#         - name: KEY1
#           value: VALUE1
#         - name: KEY2
#           value: VALUE2
environment:
  # Pod environment variables for DX Resources
  # WARNING: This environment variable only applies to Pod's main container and will not apply to other containers of the Pod (i.e., logging sidecar, prereqs checker).
  pod:
    contentComposer: []
    core: []
    damPluginGoogleVision: []
    digitalAssetManagement: []
    imageProcessor: []
    openLdap: []
    persistenceConnectionPool: []
    persistenceNode: []
    remoteSearch: []
    ringApi: []
    runtimeController: []
    haproxy: []
    licenseManager: []
    damPluginKaltura: []
    webEngine: []
# Allows to start a Pod and its containers in maintenance mode.
# Pods will not perform a regular execute of the application but will remain idle
# This allows for debugging inside the containers if required, e.g. if configuration fixes are required
maintenanceMode:
  contentComposer: false
  core: false
  damPluginGoogleVision: false
  digitalAssetManagement: false
  imageProcessor: false
  openLdap: false
  persistenceConnectionPool: false
  persistenceNode: false
  remoteSearch: false
  ringApi: false
  runtimeController: false
  haproxy: false
  licenseManager: false
  damPluginKaltura: false
  webEngine: false
# Configuration for the peopleservice sub-chart.
# Set `enabled` to `true` to enable the peopleservice sub-chart, or `false` to disable it.
peopleservice:
  enabled: false
  # Application configuration
  configuration:
    # Specifies whether you are running in production mode or not
    production: true
    # Authentication strategy. Accepted values are `OIDC`, `DX`, and `none`
    authStrategy: "DX"
    # Integration configuration
    integration:
      # Indicates if DX integration is enabled
      dx: true
    # Integration specific configuration for DX
    dx:
      # Authetnication session cookie name
      sessionCookieName: "JSESSIONID"
      # User validation endpoint that confirms if the user is still authenticated
      userValidationEndpoint: "/auth/validate"
      # Current user access endpoint that identifies the current user's access level information. 
      # This information is used to determine the user's role. 
      # Accepted values are `Privileged`, `Authenticated`, or `Unauthenticated`
      currentUserAccessEndpoint: "/dxmyrest/access/current-user?resourceId=wps.USERS"
      # List of privileged roles separated by commas
      userAccessPrivilegedRoles: "Administrator,Privileged User,Editor"
      # Context root for the People Service portlet page
      portletPageContextRoot: "/wps/myportal/Practitioner/PeopleService"
    # Search configuration
    search:
      # Search middleware configuration. This configuration is ignore in case People Service is running in DX integration mode. In DX integration mode, the configuration is picked from DX Core/Webengine configmaps.
      middleware:
        # Enable/Disable Search Middleware.
        enabled: false
      # Open search middleware content source Id for People Service.
      contentSourceId: ""
  # Networking configuration
  networking:
    # SSL configuration for the application
    ssl:
      # Indicates if the application is accessible on http or https
      enabled: true
    # Public qualified host name. For example: "example.com". If `networking.ssl.enabled` is `true`, this key will be prefixed with `https://`, and `http://` if `false`
    host: ""
    # Context root for the API and UI
    contextRoot:
      # Context root for the API
      api: "/dx/api/people/v1"
      # Context root for the UI
      # @section -- Networking configuration
      ui: "/dx/ui/people"
# Global configurations
# This configuration is only relevant for the SoFy deployments.
global:
  serviceAccountName: ""
  hclImagePullSecret:
  hclImageRegistry: "hclcr.io/sofy"
  persistence:
    rwxStorageClassV3:

