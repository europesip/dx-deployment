# Kubernetes probe configuration for application Pods
probes:
  # Content Composer probe configuration
  contentComposer:
    # Liveness probe using the applications HTTP probe endpoint
    livenessProbe:
      failureThreshold: 4
      initialDelaySeconds: 30
      periodSeconds: 30
      successThreshold: 1
      timeoutSeconds: 30
    # Readiness probe using the applications HTTP probe endpoint
    readinessProbe:
      failureThreshold: 2
      initialDelaySeconds: 30
      periodSeconds: 30
      successThreshold: 1
      timeoutSeconds: 30
  # Core probe configuration
  core:
    # Liveness probe using the application shell based probe
    livenessProbe:
      failureThreshold: 6
      initialDelaySeconds: 0
      periodSeconds: 30
      successThreshold: 1
      timeoutSeconds: 10
      # You may add a custom URL, e.g., "/sample/url". The leading slash is required. The URL defaults to "/ibm/console" when this is empty. 
      customProbeURL: ""
