        callBackHost: http://RELEASE_NAME-digital-asset-management:DAM_HTTP_PORT
        authKey: PluginSecretAuthKey
        enable: false
        actions:
          annotation:
            params: {}
            url: "/annotation"
            # The below determines dam schema migration expired time. Expired time is allotted time to complete the schema migration.
    damSchemaMigrationExpiredTimeInMinutes: 10
    # Optional custom path definition to access the DAM resources.
    # This will add a rewrite to HAProxy and make the assets accessible at the custom path. If no path is set, the rewrite is disabled
    # The following optional query parameters can be used with the custom path:
    #   "binary": true/false - retrieves the asset file as a binary if true or the metadata if false
    #   "rendition": "Original"/"Desktop"/"Tablet"/"Smartphone"/"{custom rendition}" - retrieves the specified rendition of the asset
    #   "version": (Version number or id) - retrieves the specified version of the asset
    # Example:
    #   friendlyUrlContextRoot: "/assets"
    # will make the assets accessible at:
    #   "/assets/{collection name/unique id}/{asset name/unique id}?binary={true/false}&rendition={rendition type}&version={version id}"
    friendlyUrlContextRoot: ""
    # The threshold limit to keeping failed operation jobs in the operation table in DAM.
    failedOperationThresholdLimitRecords: 20000
    # Threshold time to keeping failed operation jobs in the operation table in DAM.
    failedOperationThresholdTimeHours: 24
    # The below DAM operation worker limit count determines the number of workers used to the process the pending operation entries
    operationWorkerLimit: 10
    # The below DAM operation timeout determines the time in minutes to wait for the operation to complete
    operationTimeout: 30
    # max-age for cache header
    maxAge: 600
    # max-age for static cache header
    staticMaxAge: 86400
    # LTPA Token refresh time and the value should be less than LTPA Token Expiry 
    ltpaTokenRefreshTimeInMinutes: 5
    # Crop aspect ratio to crop an image in edit page in DAM
    cropAspectRatio:
      - "1:1"
      - "4:3"
      - "3:2"
      - "16:9"
      - "9:16"
    # This configurations allows users to access all the collections irrespective of Access control but protecting viewing/editing/deleting assets based on Access control.
    aclTraversal: false
    # Time-to-live (TTL) value (in seconds) for caching access control (ACL) data
    aclCacheTtl: 10
    # Time-to-live (TTL) value (in seconds) for caching authentication data
    authCacheTtl: 600
    # Enables or disables collection creation for editor roles in DAM.
    allowEditorToCreateCollections: true
    # Specifies the maximum time (in minutes) to wait for a response before timing out.
    nodeRequestTimeoutInMinutes: 15
    # Enable or disable the heartbeats (validationHeartbeat, renditionOrVersionHeartbeat, cleanUpHeartbeat, orphanDataAndFileCleanupHeartbeat)
    enableCleanUpOrRenditionVersionHeartbeats: false
    # Interval to run Validation heartbeat
    validationHeartbeatIntervalTimeInMinutes: 10
    # Interval to run Rendition or Version generation heartbeat
    renditionOrVersionHeartbeatIntervalTimeInMinutes: 60
    # Interval to run clean up heartbeat
    cleanUpHeartbeatIntervalTimeInMinutes: 1440
    # Interval to run orphan data and file cleanup heartbeat
    orphanDataAndFileCleanupHeartbeatIntervalTimeInMinutes: 1440
    # A time period based on creation time, after which asset can be validated
    mediaCreationThresholdTimeInMinutes: 1440
    # A time period based on last scan time, after which a valid asset can be re-validated
    lastScanThresholdTimeInMinutes: 360
    # A time period based on creation time, after which orphan directory can be cleaned up
    orphanDirectoryModificationThresholdTimeInMinutes: 1440
    # A time period based on creation time, after which orphan data in database can be cleaned up
    orphanMediaStorageCreationThresholdTimeInMinutes: 1440
    # Maximum number of items to be scanned on each validation heartbeat
    maxValidationProcessingLimit: 100
    # Maximum number of records while checking the hash in staging failure heartbeat
    maxRecordsToCompare: 10000
    # Maximum number of change records to be send to subscriber per request
    eventListLength: 200
    # Specifies the maximum permissible number of files and folders for a bulk upload, triggering a warning message if exceeded.
    maxBulkUploadWithoutWarning: 100
    # Enabling this will manage the DAM database using the RTC, follow switching procedure when changing this value.
    # WARNING: Changing this value on an existing installation can cause data loss, follow switching procedure  
    newDbManagement: false
  # License Manager Configuration
  licenseManager:
    # Configures if this environment is a production environment.
    # For non production environments sessions are not counted but the license
    # is still validated.
    productionEnvironment: true
    # License Server URI. Ex: for MHS: https://api.hcltechsw.com
    licenseServerUri: "https://api.hcltechsw.com"
    # Source Identity for Manual session usage report
    licenseManualReportUniqueIdentifier: ""
    # AWS Service Account Name for EKS deployments
    serviceAccountName: ""
    # AWS License Config Secret for Self Managed Clusters
    licenseConfigSecret: ""
    # Custom Deployment key secret for MHS deployment instance
    customMhsDeploymentKeySecret: ""
    # Deployment key for MHS deployment instance
    mhsDeploymentKey: ""
  # DAM Kaltura Plugin configurations
  damPluginKaltura:
    # kaltura plugin configuration for thumbnail URL.
    thumbnailUrlPattern: https://cfvod.kaltura.com/p/{PARTNERID}/sp/{PARTNERID}00/thumbnail/entry_id/{ENTRYID}/width/{width}/height/{height}/type/3
    # kaltura plugin configuration for partnerId.
    partnerId: partnerId
  # Prereqs Checker configurations
  prereqsChecker:
    # For changing the state enable/disable
    enabled: true
    # Cronjob expression to run the checks periodically
    checkSchedule: "0 8 * * *"
  # Runtime Controller configurations
  runtimeController:
    # For AWS Marketplace deployments Runtime Controller will try to lookup the pull secret from the ServiceAccount specified in configuration.licenseManager.serviceAccountName.
    # The awsMpPullSecret can be used to override the pull secret and not use the lookup. 
    awsMpPullSecret: ""
    # Leader election configuration
    leaderElection:
      # Time before leader leases expire
      leaseExpiryTime: 15
      # Time for polling the existing lease for renewal and validation
      leasePollingTime: 5
  # To change the timezone of all the containers. This value should be a valid timezone format (i.e. Australia/Melbourne, Europe/London, America/Phoenix).
  # WARNING: If you are using DAM Staging and/or WCM syndication, then all the deployments must be in same timezone, to prevent issues during synchronisation.
  containerTimezone: ""
  # Search Middleware configurations
  searchMiddleware:
    # Enable/Disable Search Middleware
    enabled: false
    # Host of Search Middleware
    host: ""
    # Port of Search Middleware
    port:
    # Setting if SSL is enabled for Search Middleware
    ssl: false
    # Username of the push administrator
    pushAdminUser: "pushadmin"
    # Password of the push administrator
    pushAdminPassword: "adminpush"
    # Provide a custom secret that will be used to set credentials for push administration
    # If customPushAdminSecret is provided then pushAdminUser & pushAdminPassword values are ignored
    customPushAdminSecret: ""
    # Content Source ID of DAM
    damContentSourceId: ""
  # persistenceNode configuration
  persistence:
    # The database name for DAM
    databaseName: "dxmediadb"
    # The external Database host name. This should be left blank if the internal persistenceNode database is used.
    host: ""
    # The external Database ssl configuration. This should be set to false for internal persistenceNode database.
    ssl: false
    # The interval at which the health of the persistenceNode cluster is checked
    validationSleepTimer: 120
  # Application specific configuration for webEngine
  webEngine:
    # The configOverrideFiles parameter can be used to pass Web Engine server configuration snippets to the DX server.
    # The snippets will be merged into the default server.xml according to https://openliberty.io/docs/latest/reference/config/server-configuration-overview.html
    # Changes are picked up by Web Engine Server and applied at runtime. They don't require a Pod restart.
    # Example configuration:
    #
    # configuration:
    #   webEngine:
    #     configOverrideFiles:
    #       myCustomOverride.xml: |
    #         <server description="dxServer">
    #           <.../>
    #         </server>
    #
    configOverrideFiles: {}
    # Enable or disable debug option for the Web Engine
    # Enabling debug option requires a server restart for the changes to take effect.
    # Disabling debug option does not require a server restart.
    # Once debug option is enabled, you can connect using Eclipse or a similar tool to attach the debugger on port 7777.
    # WARNING: Enabling debug option may impact performance and expose sensitive information. It is recommended to enable it only in development or controlled environments.
    debug: false
    # The propertiesFilesOverrides parameter can be used to add or update properties in specific properties files stored on the webEngine server.
    # After updating the values, you need to restart the server to apply the changes.
    # Limitation: only changes the properties stored in the services folder.
    # Example propertiesFilesOverrides:
    #
    # configuration:
    #   webEngine:
    #     propertiesFilesOverrides:
    #       FeedbackService.properties: // FeedbackService.properties is the properties file name need to be updated
    #          feedbackRecordCachePriority: "1" // property to be updated in the FeedbackService.properties
    #          newProperty: "test"
    #          logBufferSize: "5001"
    #
    propertiesFilesOverrides: {}
    # The propertiesDisable parameter can be used to disable properties from specific properties files in the webEngine server. It is equivalent to commenting a setting.
    # After updating the values, you need to restart the server to apply the changes.
    # Example propertiesDisable:
    #
    #
    # configuration:
    #   webEngine:
    #     propertiesDisable:
    #       FeedbackService.properties: 
    #         feedbackRecordCachePriority: ""
    #         logBufferSize: ""
    propertiesDisable: {}
    # If set to true, the external database specified in dbDomainProperties will be used for the WebEngine database.
    # On the first startup of the WebEngine, the database will be transferred automatically from Derby to the external database.
    useExternalDatabase: false
    # If set to true, existing WebEngine database tables will be dropped and re-created whenever database transfer is run.
    dropDatabaseTables: false
    # Provide a custom secret that will be used to set the DB Domain properties.
