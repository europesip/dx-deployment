# Scaling settings for deployed applications
scaling:
  # The default amount of replicas per application
  replicas:
    contentComposer: 1
    core: 1
    damPluginGoogleVision: 1
    digitalAssetManagement: 1
    imageProcessor: 1
    ringApi: 1
    persistenceConnectionPool: 1
    runtimeController: 1
    # you should not increase the number of persistence node to more than 5
    persistenceNode: 1
    haproxy: 1
    licenseManager: 1
    damPluginKaltura: 1
    webEngine: 1
  # Automated scaling using HorizontalPodAutoScaler
  horizontalPodAutoScaler:
    # Autoscaling settings for Content Composer
    contentComposer:
      # Enable or disable autoscaling
      enabled: false
      # Minimum and maximum Pod count
      minReplicas: 1
      maxReplicas: 3
      # Target CPU utilization scaling threshold
      targetCPUUtilizationPercentage: 75
      # Target Memory utilization scaling threshold
      targetMemoryUtilizationPercentage: 80
    # Autoscaling settings for Core
    core:
      # Enable or disable autoscaling
      enabled: false
      # Minimum and maximum Pod count
      minReplicas: 1
      maxReplicas: 3
      # Target CPU utilization scaling threshold
      targetCPUUtilizationPercentage: 75
      # Target Memory utilization scaling threshold
      targetMemoryUtilizationPercentage: 80
    # Autoscaling settings for DAM Plugin Google Vision
    damPluginGoogleVision:
      # Enable or disable autoscaling
      enabled: false
      # Minimum and maximum Pod count
      minReplicas: 1
      maxReplicas: 3
      # Target CPU utilization scaling threshold
      targetCPUUtilizationPercentage: 75
      # Target Memory utilization scaling threshold
      targetMemoryUtilizationPercentage: 80
    # Autoscaling settings for Digital Asset Management
    digitalAssetManagement:
      # Enable or disable autoscaling
      enabled: false
      # Minimum and maximum Pod count
      minReplicas: 1
      maxReplicas: 3
      # Target CPU utilization scaling threshold
      targetCPUUtilizationPercentage: 75
      # Target Memory utilization scaling threshold
      targetMemoryUtilizationPercentage: 80
    # Autoscaling settings for Image Processor
    imageProcessor:
      # Enable or disable autoscaling
      enabled: false
      # Minimum and maximum Pod count
      minReplicas: 1
      maxReplicas: 3
      # Target CPU utilization scaling threshold
      targetCPUUtilizationPercentage: 75
      # Target Memory utilization scaling threshold
      targetMemoryUtilizationPercentage: 80
    # Autoscaling settings for Ring API
    ringApi:
      # Enable or disable autoscaling
      enabled: false
      # Minimum and maximum Pod count
      minReplicas: 1
      maxReplicas: 3
      # Target CPU utilization scaling threshold
      targetCPUUtilizationPercentage: 75
      # Target Memory utilization scaling threshold
      targetMemoryUtilizationPercentage: 80
    # Autoscaling settings for HAproxy
    haproxy:
      # Enable or disable autoscaling
      enabled: false
      # Minimum and maximum Pod count
      minReplicas: 1
      maxReplicas: 3
      # Target CPU utilization scaling threshold
      targetCPUUtilizationPercentage: 75
      # Target Memory utilization scaling threshold
      targetMemoryUtilizationPercentage: 80
    # Autoscaling settings for DAM Kaltura Plugin
    damPluginKaltura:
      # Enable or disable autoscaling
      enabled: false
      # Minimum and maximum Pod count
      minReplicas: 1
      maxReplicas: 3
      # Target CPU utilization scaling threshold
      targetCPUUtilizationPercentage: 75
      # Target Memory utilization scaling threshold
