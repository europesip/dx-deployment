    # Provide a custom secret that will be used to set the DB Type properties
    # Please make sure that the secret uses the following key: dx_dbtype.properties
    # If customDbTypePropertiesSecret is provided then all dbTypeProperties values are ignored
    customDbTypePropertiesSecret: ""
    dbTypeProperties:
      derby.DbDriver: "org.apache.derby.jdbc.EmbeddedDriver"
      derby.DbLibrary: "/opt/HCL/AppServer/derby/lib/derby.jar"
      derby.JdbcProviderName: "wpdbJDBC_derby"
      db2.DbDriver: "com.ibm.db2.jcc.DB2Driver"
      db2.DbLibrary: "/opt/openliberty/wlp/usr/svrcfg/templates/jars/db2/db2jcc4.jar"
      db2.JdbcProviderName: "wpdbJDBC_db2"
    # Settings for LDAP configuration
    ldap:
      # Determines which type of LDAP to use
      # Accepts: "none", "dx" or "other"
      # "none" - no LDAP configuration
      # "dx" - use DX openLDAP and configure it
      # "other" - use provided configuration for other LDAP
      type: "none"
      # User used to connect to LDAP, only used if ldap type is "other"
      bindUser: ""
      # Password used to connect to LDAP, only used if ldap type is "other"
      bindPassword: ""
      # Provide secret name to be used for LDAP bind credentials
      # Required attributes:
      #   - bindUser
      #   - bindPassword
      customLdapSecret: ""
      # Suffix in LDAP, only used if ldap type is "other"
      suffix: ""
      # Host of LDAP, only used if ldap type is "other"
      host: ""
      # Port of LDAP, only used if ldap type is "other"
      port:
      # Supported LDAP Server types - "Custom", "IBM Lotus Domino", "IBM SecureWay Directory Server", "IBM Tivoli Directory Server", "Microsoft Active Directory", "Netscape Directory Server", "Novell eDirectory", "Sun Java System Directory Server"
      serverType: "Custom"
      # LDAP configuration id
      id: "dx_ldap"
      # Mapping attributes between LDAP and DX, LDAP attribute names (array of elements)
      attributeMappingLdap:
        - "mail"
        - "title"
        - "userPassword"
      # Mapping attributes between LDAP and DX, DX attribute names (array of elements)
      attributeMappingPortal:
        - "ibm-primaryEmail"
        - "ibm-jobTitle"
        - "password"
      # Non-supported LDAP attributes (array of elements)
      attributeNonSupported:
        - "certificate"
        - "members"
    # Settings for Transient Users configuration
    transientUserRegistry:
      # Indicates if the transient user registry feature is enabled
      enabled: false
    # Settings for tuning
    tuning:
      # Configures if the environment should be configured for authoring or not
      authoring: true
    ltpa:
      # Pass the name of the LTPA secret to be used for LTPA configuration. The secret should contain the following keys:
      # - ltpa.keys
      # - password
      customLtpaSecret: ""
    # Defines if the configuration console for the IBM WebSphere Application Server of Core is exposed to the network
    exposeConfigurationConsole: true
    # Settings for content AI 
    contentAI:
