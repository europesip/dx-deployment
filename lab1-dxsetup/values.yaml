# Persistent Volume Setup
volumes:
  # Persistent Volumes for Core
  core:
    # Shared profile PVC shared by all Core pods - RWX
    profile:
      storageClassName: "manual"
      requests:
        storage: "10Gi"
      # Optional label selector to further filter the set of volumes. Only the volumes whose labels match the selector can be bound to the claim.
      selector:
      # Optional volume name to specifically map to
      volumeName:
    # Transaction Log PVC, one per Core pod - RWO
    tranlog:
      storageClassName: "manual"
      requests:
        storage: "50Mi"
      # Optional label selector to further filter the set of volumes. Only the volumes whose labels match the selector can be bound to the claim.
      selector:
      # Optional volume name to specifically map to
      volumeName:
    # Application Log PVC, one per Core pod - RWO
    log:
      storageClassName: "manual"
      requests:
        storage: "250Mi"
      # Optional label selector to further filter the set of volumes. Only the volumes whose labels match the selector can be bound to the claim.
      selector:
      # Optional volume name to specifically map to
      volumeName:
    # List of optional additional Core PVCs for customer applications
    # Each list element must include a unique "name", one or more "accessModes"
    # from the options ReadWriteOnce, ReadOnlyMany or ReadWriteMany, a "mountPath" specifying where in the
    # core container it should be mounted, a "storageClassName" and a size in "requests/storage".
    # It may also optionally include a "selector" section to select specific PVs based on their labels.
    # It may also optionally include a "volumeName" to select a specific PV.
    # Example:
    # customPVCs:
    #   - name: "test1"
    #     accessModes:
    #       - "ReadWriteMany"
    #     mountPath: "/opt/HCL/test1"
    #     storageClassName: "manual"
    #     requests:
    #       storage: "20Gi"
    #     selector:
    #       matchLabels:
    #         label: test
    #       matchExpressions:
    #         - key: name
    #           operator: In
    #           values:
    #             - test1
    #             - test2
    #     volumeName: "test-pv"
    customPVCs: []
  # Persistent Volumes for Digital Asset Management
  digitalAssetManagement:
    # Binary storage PVC, shared by all Digital Asset Management Pods - RWX
    binaries:
      storageClassName: "manual"
      requests:
        storage: "2Gi"
      # Optional label selector to further filter the set of volumes. Only the volumes whose labels match the selector can be bound to the claim.
      selector:
      # Optional volume name to specifically map to
      volumeName:
  # Persistent Volumes for Persistence Node
  persistenceNode:
    # Database PVC, one per Persistence Node
    database:
      storageClassName: "manual"
      requests:
        storage: "2Gi"
      # Optional label selector to further filter the set of volumes. Only the volumes whose labels match the selector can be bound to the claim.
      selector:
      # Optional volume name to specifically map to.
      volumeName:
  # Persistent Volumes for License-Manager Node
  licenseManager:
    # Database PVC, one per license-manager Node
    data:
      storageClassName: "manual"
      requests:
        storage: "2Gi"
      # Optional label selector to further filter the set of volumes. Only the volumes whose labels match the selector can be bound to the claim.
      selector:
      # Optional volume name to specifically map to.
      volumeName:
  # Persistent Volumes for Open LDAP
  openLdap:
    # slapd directory PVC, one per Open LDAP pod - RWO
    slapd:
      storageClassName: "manual"
      requests:
        storage: "100Mi"
      # Optional label selector to further filter the set of volumes. Only the volumes whose labels match the selector can be bound to the claim.
      selector:
      # Optional volume name to specifically map to
      volumeName:
    # certificate directory, on per Open LDAP pod - RWO
    certificate:
      storageClassName: "manual"
      requests:
        storage: "100Mi"
      # Optional label selector to further filter the set of volumes. Only the volumes whose labels match the selector can be bound to the claim.
      selector:
      # Optional volume name to specifically map to
      volumeName:
    # ldap directory PVC, one per Open LDAP pod - RWO
    ldap:
      storageClassName: "manual"
      requests:
        storage: "10Gi"
      # Optional label selector to further filter the set of volumes. Only the volumes whose labels match the selector can be bound to the claim.
      selector:
      # Optional volume name to specifically map to
      volumeName:
  # Persistent Volumes for Remote Search
  remoteSearch:
    # Remote Search profile PVC, one per Remote Search pod - RWO
    prsprofile:
      storageClassName: "manual"
      requests:
        storage: "10Gi"
      # Optional label selector to further filter the set of volumes. Only the volumes whose labels match the selector can be bound to the claim.
      selector:
      # Optional volume name to specifically map to
      volumeName:
  # Persistent Volumes for webEngine
  webEngine:
    # Customization PVC one per webEngine pod - RWO
    customization:
      storageClassName: "manual"
      requests:
        storage: "500Mi"
      # Optional label selector to further filter the set of volumes. Only the volumes whose labels match the selector can be bound to the claim.
      selector:
      # Optional volume name to specifically map to
      volumeName:
    # Application Log PVC, one per webEngine pod - RWO
    log:
      storageClassName: "manual"
      requests:
        storage: "250Mi"
      # Optional label selector to further filter the set of volumes. Only the volumes whose labels match the selector can be bound to the claim.
      selector:
      # Optional volume name to specifically map to
      volumeName:
    # List of optional additional WebEngine PVCs one per webEngine pod - RWO for customer applications
    # Each list element must include a unique "name", one or more "accessModes"
    # Only supported option is ReadWriteOnce, a "mountPath" specifying where in the
    # WebEngine container it should be mounted, a "storageClassName" and a size in "requests/storage".
    # It may also optionally include a "selector" section to select specific PVs based on their labels.
    # It may also optionally include a "volumeName" to select a specific PV.
    # Example:
    # customPVCs:
    #   - name: "test1"
    #     accessModes:
    #       - "ReadWriteOnce"
    #     mountPath: "/opt/openliberty/test1"
    #     storageClassName: "manual"
    #     requests:
    #       storage: "20Gi"
    #     selector:
    #       matchLabels:
    #         label: test
    #       matchExpressions:
    #         - key: name
    #           operator: In
    #           values:
    #             - test1
    #             - test2
    #     volumeName: "test-pv"
    customPVCs: []
# Controls which application is deployed and configured
applications:
  # Deploys Content Composer
  contentComposer: true
  # Deploys Core
  core: true
  # Deploys the DAM Plugin Google Vision
  damPluginGoogleVision: false
  # Deploys Digital Asset Management
  # Enabling dxPicker will override this setting with: true
  digitalAssetManagement: true
  # Deploys the Image Processor
  # Enabling digitalAssetManagement will override this setting with: true
  imageProcessor: true
  # Deploy Open LDAP
  # Setting the ldap type in the core application configuration to dx will override this setting with: true
  openLdap: true
  # Deploys the Persistence Layer
  # Enabling digitalAssetManagement and leaving the configuration.persistence.host setting empty will override the persistence setting to: true
  persistence: true
  # Deploys the Remote Search
  remoteSearch: true
  # Deploys the Ring API
  # Enabling either digitalAssetManagement or contentComposer will override this setting with: true
  ringApi: true
  # Deploys the Runtime Controller
  runtimeController: true
  # Deploy HAProxy
  haproxy: true
  # If using the cloud native licensing you are required to set this to true.
  # The License Manager service manages the license requirements for your DX deployment.
  licenseManager: false
  # Deploys the DAM kaltura plugin
  damPluginKaltura: false
  # Deploys DX Picker
  dxPicker: true
  # Deploys webEngine
  webEngine: false
# Networking specific configuration
networking:
  # Networking configuration specific to Core
  core:
    # Host of Core, must be specified as a FQDN
    # If you are running hybrid, you need to specify the FQDN of the on-premise Core host
    # If left blank, a later helm upgrade will pull it from HAproxy's load balancer IP.
    host: ""
    # Port of Core
    # If you are running hybrid, you can specify a port
    # If left empty, no specific port will be added to the host
    port:
    # Setting if SSL is enabled for Core
    # If you are running hybrid, make sure to set this accordingly to the on-premise Core host configuration
    # Will default to true if not set
    ssl: true
    # Core Context root, only alter if your deployment already uses a non default context route
    contextRoot: "wps"
    # Core personalized home, only alter if your deployment already uses a non default personalized home
    personalizedHome: "myportal"
    # Core home, only alter if your deployment already uses a non default home
    home: "portal"
    # None, Lax, Strict, or empty string
    # Setting this to an empty string would not add the SameSite attribute for WASReqURL cookie
    # Note: This should only be set in an HTTPS environment to prevent unwanted behaviours
    cookieSameSiteAttribute: ""
    # Enables/Disables CSP frame-ancestor header
    # Note: 'self' is always added when this is enabled to enable DX internal features
    # see: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy/frame-ancestors
    cspFrameAncestorsEnabled: false
    # Add list of allowed source URLS to the the CSP frame-ancestor header this will only reflect if cspFrameAncestorsEnabled is set to true
    # Example:
    # cspFrameAncestorsAllowedSourceURLs:
    #   - 'https://example.com'
    # This would result to the following response header:
    # content-security-policy: frame-ancestors 'self' https://example.com
    cspFrameAncestorsAllowedSourceURLs: []
  # Networking configurations specific to all addon applications
  addon:
    # Host of the addon applications
    # If you are not running hybrid, you can leave this value empty to use relative hostnames 
    # If you are running hybrid, you need to specify the FQDN of the Kubernetes deployment
    host: ""
    # Port of the addon applications
    # If you are running hybrid, you can specify a port
    # If left empty, no specific port will be added to the host
    port:
    # Setting if SSL is enabled for addon applications
    # If you are running hybrid, make sure to set this accordingly to the Kubernetes deployment configuration
    # Will default to true if not set
    ssl: true
    # Setting if internal routing from Ring API, Digital Asset Management, and Content Composer should go through HAProxy.
    # Set to true if more than one core pod is deployed and the application is configured to use transient users or anything else that requires session affinity.
    # Will default to false if not set
    internalCallsUseHaproxy: false
    contentComposer:
      # CORS Origin configuration for Content Composer, array of elements
      corsOrigin: []
      # Enables/Disables CSP frame-ancestor header
      # Note: 'self' is always added when this is enabled to enable DX internal features
      # see: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy/frame-ancestors
      cspFrameAncestorsEnabled: false
      # Add list of allowed source URLS to the the CSP frame-ancestor header this will only reflect if cspFrameAncestorsEnabled is set to true
      # Example:
      # cspFrameAncestorsAllowedSourceURLs:
      #   - 'https://example.com'
      # This would result to the following response header:
      # content-security-policy: frame-ancestors 'self' https://example.com
      cspFrameAncestorsAllowedSourceURLs: []
    damPluginGoogleVision:
      # CORS Origin configuration for DAM Plugin Google Vision, array of elements
      corsOrigin: []
    digitalAssetManagement:
      # Staging related network configurations
      staging:
        # Host of the DAM Staging environment
        # If you are not running hybrid, you can leave this value empty and the Core host will be used
        # If you are running hybrid, you need to specify the FQDN of the Kubernetes deployment
        host: ""
        # Port of the DAM Staging environment
        # If you are running hybrid, you can specify a port
        # If left empty, no specific port will be added to the host
        port:
        # Setting if SSL is enabled for DAM Staging environment
        # If you are running hybrid, make sure to set this accordingly to the Kubernetes deployment configuration
        # Will default to true if not set
        ssl: true
      # CORS Origin configuration for Digital Asset Management, array of elements
      corsOrigin: []
      # Enables/Disables CSP frame-ancestor header
      # Note: 'self' is always added when this is enabled to enable DX internal features
      # see: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy/frame-ancestors
      cspFrameAncestorsEnabled: false
      # Add list of allowed source URLS to the the CSP frame-ancestor header this will only reflect if cspFrameAncestorsEnabled is set to true
      # Example:
      # cspFrameAncestorsAllowedSourceURLs:
      #   - 'https://example.com'
      # This would result to the following response header:
      # content-security-policy: frame-ancestors 'self' https://example.com
      cspFrameAncestorsAllowedSourceURLs: []
      caTrustSecret: ""
    imageProcessor:
      # CORS Origin configuration for Image Processor, array of elements
      corsOrigin: []
      # Enables/Disables CSP frame-ancestor header
      # Note: 'self' is always added when this is enabled to enable DX internal features
      # see: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy/frame-ancestors
      cspFrameAncestorsEnabled: false
      # Add list of allowed source URLS to the the CSP frame-ancestor header this will only reflect if cspFrameAncestorsEnabled is set to true
      # Example:
      # cspFrameAncestorsAllowedSourceURLs:
      #   - 'https://example.com'
      # This would result to the following response header:
      # content-security-policy: frame-ancestors 'self' https://example.com
      cspFrameAncestorsAllowedSourceURLs: []
    ringApi:
      # CORS Origin configuration for Ring API, array of elements
      corsOrigin: []
      # Enables/Disables CSP frame-ancestor header
      # Note: 'self' is always added when this is enabled to enable DX internal features
      # see: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy/frame-ancestors
      cspFrameAncestorsEnabled: false
      # Add list of allowed source URLS to the the CSP frame-ancestor header this will only reflect if cspFrameAncestorsEnabled is set to true
      # Example:
      # cspFrameAncestorsAllowedSourceURLs:
      #   - 'https://example.com'
      # This would result to the following response header:
      # content-security-policy: frame-ancestors 'self' https://example.com
      cspFrameAncestorsAllowedSourceURLs: []
    damPluginKaltura:
      # CORS Origin configuration for DAM Kaltura Plugin, array of elements
      corsOrigin: []
  # Networking configurations specific to HAProxy
  haproxy:
    # Configuration to enable/disable ssl offloading in HAProxy
    ssl: true
    # Configuration to set the type Service type for the HAProxy Service. Supported values are "ClusterIP", "LoadBalancer" and "NodePort"
    serviceType: "LoadBalancer"
    # Configuration to set the port exposed by the HAProxy Service. If this is not set, port 80 will be used if SSL offloading is disabled. If it is enabled port 443 is used
    servicePort:
    # Only applied for serviceType "NodePort". Configuration to set the NodePort exposed by the HAProxy Service. If this is not set, a port will automatically be selected by Kubernetes
    serviceNodePort:
    # HTTP Strict Transport Security (HSTS) requires the use of SSL in DX or any proxy in front of it when enabled.
    strictTransportSecurity:
      enabled: true
      maxAge: 31536000
      includeSubDomains: false
      preload: false
    # Set cookie value for session affinity in HAProxy configuration for DX applications that require session affinity (e.g. Core)
    sessionCookieName: "JSESSIONID"
    # Set the "SameSite" attribute for the HAProxy DxSessionAffinity cookie to the values: None, Lax, Strict, or empty string
    # Setting this to an empty string will not add the SameSite attribute to the DxSessionAffinity cookie.
    # Note: This should only be set in an HTTPS environment to prevent unwanted behaviours
    affinityCookieSameSiteAttribute: ""
    # Set alwaysEnableSessionAffinity to ensure any session, even unauthenticated sessions, receive a DxSessionAffinity token and route to a single
    # core pod for the lifetime of the session. Defaults to false.
    alwaysEnableSessionAffinity: false
    # Optionally set the "domain" attribute for the DxSessionAffinity cookie. This is necessary if multiple subdomains can 
    # access this deployment. To set a domain that allows for multiple subdomains, set [".domain.com"]
    # Supported values are an array of strings. Example: ["domain1", "domain2"]. Note completely different primary domains are 
    # not supported by most browsers, but subdomains are supported.
    # If left empty, this reverts to the host.
    affinityCookieDomain: []
    # Set custom headers to be added to the HAProxy configuration. These will be added to all responses from HAProxy and overwrite existing headers.
    # Example:
    # customHeader:
    #   - name: X-Permitted-Cross-Domain-Policies
    #     value: none
    customHeader: []
    # Set custom headers to be removed from all responses that pass through HAProxy.
    # Example:
    # deleteHeader:
    #   - X-Powered-By
    deleteHeader: []
  # TLS Certificate secret used for HAProxy
  tlsCertSecret: "dx-tls-cert"
  # Search middleware service name, needs to match the query service if you have deployed
  # OpenSearch and the search middleware
  searchMiddlewareService: ""
  # Networking configuration specific to webEngine
  webEngine:
    # Host of webEngine, must be specified as a FQDN
    host: ""
    # Port of webEngine
    port:
    # Setting if SSL is enabled for webEngine
    ssl: true
    # webEngine Context root, only alter if your deployment already uses a non default context route
    contextRoot: "wps"
    # webEngine personalized home, only alter if your deployment already uses a non default personalized home
    personalizedHome: "myportal"
    # webEngine home, only alter if your deployment already uses a non default home
    home: "portal"
    # None, Lax, Strict, or empty string
    # Setting this to an empty string would not add the SameSite attribute for WASReqURL cookie
    # Note: This should only be set in an HTTPS environment to prevent unwanted behaviours
    cookieSameSiteAttribute: ""
    # Enables/Disables CSP frame-ancestor header
    # Note: 'self' is always added when this is enabled to enable DX internal features
    # see: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy/frame-ancestors
    cspFrameAncestorsEnabled: false
    # Add list of allowed source URLS to the the CSP frame-ancestor header this will only reflect if cspFrameAncestorsEnabled is set to true
    # Example:
    # cspFrameAncestorsAllowedSourceURLs:
    #   - 'https://example.com'
    # This would result to the following response header:
    # content-security-policy: frame-ancestors 'self' https://example.com
    cspFrameAncestorsAllowedSourceURLs: []
# Security related configuration, e.g. default credentials
security:
  # Security configuration for Core
  core:
    # Credentials used for IBM WebSphere Application Server administrative access.
    # The credentials defined in these values define the WebSphere Application Server primary administrative user. The user gets created if necessary and/or the password is set to the current value.
    # - If the WAS admin credentials were changed by any other means than through the helm values, the currently active credentials need to be entered as the values for wasUser and wasPassword.
    # - If LDAP is configured as the user repository, the WebSphere Application Server admin user won't be applied automatically and LDAP has the authority over the credentials. Whenever the credentials are changed in LDAP, the values for wasUser and wasPassword need to be manually updated accordingly.
    # If wasUser and/or wasPassword is not empty, the customWasSecret below should be an empty string. If both default credential and secret name are filled it will block the chart from being deployed.
    wasUser: "wpsadmin"
    wasPassword: ""
    # Provide a secret name that will be used to set credentials for WAS
    # Required attributes:
    #   - username
    #   - password
    # If customWasSecret is not empty, wasUser and wasPassword should be an empty string. If both default credential and secret name are filled it will block the chart from being deployed.
    customWasSecret: ""
    # Credentials used for HCL Digital Experience Core administrative access.
    # The credentials defined in these values define the HCL Digital Experience Core administrative user. The user gets created if necessary and/or the password is set to the current value.
    # - If LDAP is configured as the user repository, the WebSphere Application Server admin user won't be applied automatically and LDAP has the authority over the credentials. Whenever the credentials are changed in LDAP, the values for wpsUser and wpsPassword need to be manually updated accordingly.
    # If wpsUser and/or wpsPassword is not empty, the customWpsSecret below should be an empty string. If both default credential and secret name are filled it will block the chart from being deployed.
    wpsUser: "wpsadmin"
    wpsPassword: ""
    # Provide a secret name that will be used to set credentials for WPS
    # Required attributes:
    #   - username
    #   - password
    # If customWpsSecret is not empty, wpsUser and wpsPassword should be an empty string. If both default credential and secret name are filled it will block the chart from being deployed.
    customWpsSecret: ""
    # Credentials used for Config Wizard administrative access. This only takes effect when "configuration.core.tuning.configWizard" is enabled.
    # The credentials defined in these values define the WebSphere Application Server primary administrative user. The user gets created if necessary and/or the password is set to the current value.
    # This will also map the user as the user for Config Wizard and dxconnect (for dxclient)
    # - If the Config Wizard admin credentials were changed by any other means than through the helm values, the currently active credentials need to be entered as the values for configWizardUser and configWizardPassword.
    # - If LDAP is configured as the user repository, the WebSphere Application Server admin user won't be applied automatically and LDAP has the authority over the credentials. Whenever the credentials are changed in LDAP, the values for configWizardUser and configWizardPassword need to be manually updated accordingly.
    # If configWizardUser and/or configWizardPassword is not empty, the customConfigWizardSecret below should be an empty string. If both default credential and secret name are filled it will block the chart from being deployed.
    configWizardUser: "wpsadmin"
    configWizardPassword: ""
    # Provide a secret name that will be used to set credentials for Config Wizard
    # Required attributes:
    #   - username
    #   - password
    # If customConfigWizardSecret is not empty, configWizardUser and configWizardPassword should be an empty string. If both default credential and secret name are filled it will block the chart from being deployed.
    customConfigWizardSecret: ""
    # Security configuration for AI APIs: 
    # API key for AI Provider
    contentAIProviderAPIKey: ""
    # Provide a secret name that will be used to set AI API Keys
    customContentAISecret: ""
  # Security configuration for dam-plugin-google-vision
  damPluginGoogleVision:
    # If authenticationKey and/or apiKey is not empty, the customDamGoogleVisionSecret below should be an empty string. If both default credential and secret name are filled it will block the chart from being deployed.
    # Authentication key for Plugin API
    authenticationKey: "PluginSecretAuthKey"
