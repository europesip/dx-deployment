# Default values for hcl-dx-deployment.

# Image related configuration
images:
  # Image pulling behavior, accepts: Always, Never, IfNotPresent
  pullPolicy: "IfNotPresent"
  # Image pull secrets used for accessing the repository
  # Secret must be annotated: - name: <SECRETNAME>
  imagePullSecrets:
  # Container repository used to retrieve the images
  repository: ""
  # Image tag for each application
  tags:
    contentComposer: "v1.44.0_20251024-1345"
    core: "v95_CF231_20251024-1409"
    damPluginGoogleVision: "v1.0.0_20251024-1346"
    digitalAssetManagement: "v1.43.0_20251024-1357"
    imageProcessor: "v1.44.0_20251024-1405"
    openLdap: "v2.6.8_20251024-1348"
    persistenceConnectionPool: "v1.41.0_20251024-1356"
    persistenceNode: "v1.31_20251024-1354"
    persistenceMetricsExporter: "v1.39.0_20251024-1357"
    remoteSearch: "v95_CF231_20251024-1409"
    ringApi: "v1.44.0_20251024-1347"
    runtimeController: "v95_CF231_20251024-1351"
    loggingSidecar: "v1.0.0_20251024-1349"
    haproxy: "v1.27.0_20251024-1338"
    damPluginKaltura: "v1.0.0_20251024-1346"
    licenseManager: "v95_CF231_20251024-1349"
    prereqsChecker: "v1.0.0_20251024-1353"
    webEngine: "CF231_20251025-2351"
  # Image name for each application
  names:
    contentComposer: "dx/content-composer"
    core: "dx/core"
    damPluginGoogleVision: "dx/dam-plugin-google-vision"
    digitalAssetManagement: "dx/digital-asset-manager"
    imageProcessor: "dx/image-processor"
    openLdap: "dx/openldap"
    persistenceConnectionPool: "dx/persistence-connection-pool"
    persistenceNode: "dx/persistence-node"
    persistenceMetricsExporter: "dx/persistence-metrics-exporter"
    remoteSearch: "dx/remote-search"
    ringApi: "dx/ringapi"
    runtimeController: "dx/runtime-controller"
    loggingSidecar: "dx/logging-sidecar"
    haproxy: "dx/haproxy"
    damPluginKaltura: "dx/dam-plugin-kaltura"
    licenseManager: "dx/license-manager"
    prereqsChecker: "dx/prereqs-checker"
    webEngine: "dx/webengine"
# Resource allocation settings, definition per pod
# Use number + unit, e.g. 1500m for CPU or 1500M for Memory
# The limits can be set to null explicitly to not limit the resources. Cluster and namespace level resource limits will still apply.
resources:
  # Content composer resource allocation
  contentComposer:
    requests:
      cpu: "100m"
      memory: "192Mi"
    limits:
      cpu: "100m"
      memory: "192Mi"
  # Core resource allocation
  core:
    requests:
      cpu: "2000m"
      memory: "4096Mi"
    limits:
      cpu: "4000m"
      memory: "6144Mi"
  # DAM Plugin Google Vision resource allocation
  damPluginGoogleVision:
    requests:
      cpu: "100m"
      memory: "384Mi"
    limits:
      cpu: "100m"
      memory: "384Mi"
  # Digital asset management resource allocation
  digitalAssetManagement:
    requests:
      cpu: "500m"
      memory: "1536Mi"
    limits:
      cpu: "500m"
      memory: "1536Mi"
  # Image processor resource allocation
  imageProcessor:
    requests:
      cpu: "200m"
      memory: "2048Mi"
    limits:
      cpu: "200m"
      memory: "2048Mi"
  # Open LDAP resource allocation
  openLdap:
    requests:
      cpu: "200m"
      memory: "768Mi"
    limits:
      cpu: "200m"
      memory: "768Mi"
      # Persistence Connection Pool resource allocation
  persistenceConnectionPool:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  # PG Repmanager resource allocation
  persistenceNode:
    requests:
      cpu: "500m"
      memory: "1024Mi"
    limits:
      cpu: "500m"
      memory: "1024Mi"
  # Remote Search resource allocation
  remoteSearch:
    requests:
      cpu: "500m"
      memory: "2048Mi"
    limits:
      cpu: "500m"
      memory: "2048Mi"
  # Ring API resource allocation
  ringApi:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "100m"
      memory: "256Mi"
  # Runtime Controller resource allocation
  runtimeController:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "100m"
      memory: "256Mi"
  # Persistence metrics exporter resource allocation
  persistenceMetricsExporter:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"
  # Logging Sidecar resource allocation
  loggingSidecar:
    requests:
      cpu: "100m"
      memory: "64Mi"
