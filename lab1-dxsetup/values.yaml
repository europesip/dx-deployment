# Application configuration
configuration:
  # Application specific configuration for Core
  core:
    # Settings for LDAP configuration
    ldap:
      # Determines which type of LDAP to use
      # Accepts: "none", "dx" or "other"
      # "none" - no LDAP configuration
      # "dx" - use DX openLDAP and configure it
      # "other" - use provided configuration for other LDAP
      type: "none"
      # User used to connect to LDAP, only used if ldap type is "other"
      bindUser: ""
      # Password used to connect to LDAP, only used if ldap type is "other"
      bindPassword: ""
      # Provide secret name to be used for LDAP bind credentials
      # Required attributes:
      #   - bindUser
      #   - bindPassword
      customLdapSecret: ""
      # Suffix in LDAP, only used if ldap type is "other"
      suffix: ""
      # Host of LDAP, only used if ldap type is "other"
      host: ""
      # Port of LDAP, only used if ldap type is "other"
      port:
      # Supported LDAP Server types - CUSTOM
      serverType: "CUSTOM"
      # LDAP configuration id
      id: "dx_ldap"
      # Mapping attributes between LDAP and DX, LDAP attribute names (array of elements)
      attributeMappingLdap:
        - "mail"
        - "title"
        - "userPassword"
      # Mapping attributes between LDAP and DX, DX attribute names (array of elements)
      attributeMappingPortal:
        - "ibm-primaryEmail"
        - "ibm-jobTitle"
        - "password"
      # Non-supported LDAP attributes (array of elements)
      attributeNonSupported:
        - "certificate"
        - "members"
    # Settings for tuning
    tuning:
      # Configures if the environment should be configured for authoring or not
      authoring: true
      # Configures if the server for configWizard and dxconnect is started.
      # If this is set to true, the WAS console for configWizard and dxconnect is also exposed on port 10203 at the path /ibm/console
      configWizard: true
    ltpa:
      # Configures if LTPA is enabled
      enabled: false
      # DX password
      password: ""
      # LTPA version
      version: ""
      # Realm
      realm: ""
      # 3DES key
      desKey: ""
      # Private LTPA key
      privateKey: ""
      # Public LTPA key
      publicKey: ""
      # Provide a secret name that will be used for LTPA configuration
      # Required attributes:
      #  -ltpa.version
      #  -ltpa.realm
      #  -ltpa.desKey
      #  -ltpa.privateKey
      #  -ltpa.publicKey
      #  -ltpa.password
      customLtpaSecret: ""
    # Defines if the configuration console for the IBM WebSphere Application Server of Core is exposed to the network
    exposeConfigurationConsole: true
    # Settings for enabling/disabling Tika
    configureTika: true
    # Settings for enabling/disabling Stellent
    disableStellentDCS: true
    # Settings for content AI 
    contentAI:
      # Configures if content AI is enabled/disabled
      enabled: false
      # Settings for checking content AI provider. When contentAI.enabled is true, provider will be used.
      provider: "OPEN_AI"
      # Provide the custom AI class which implements com.hcl.workplace.wcm.restv2.ai.IAIGeneration interface in WCM
      # For e.g. className: "com.ai.sample.CustomerAI"
      className: ""
    # Settings for SearchV2 UI configuration
    search:
      # Determines if search ui v2 is enabled or not
      uiV2Enabled: false
      # Determines to which search center any input box redirects by default
      inputRedirectVersion: "v1"
      # Determines which search is used in wcm authoring
      wcmVersion: "v1"
  # Application specific configuration for Open LDAP
  openLdap:
    # Country configuration for Open LDAP
    country: "US"
    # Org configuration for Open LDAP
    org: "DX"
    # Suffix configuration for Open LDAP
    suffix: "dc=dx,dc=com"
  # Application specific configuration for Remote Search
  remoteSearch:
    # Defines if the configuration console for the IBM WebSphere Application Server of Remote Search is exposed to the network
    exposeConfigurationConsole: true
    # Enables automated Remote Search configuration, only applicable if both Core and Remote Search are enabled
    autoConfigure: false
    # Define Maximum time that DX Core will wait for the Remote Search Pod to run its configuration tasks
    coreWaitTime: 5400
    # Define Maximum time that DX Remote Search will wait for the Core Pod to run its configuration tasks
    remoteSearchWaitTime: 5400
    # Limit of retries that DX Remote Search will perform if DX Core is not reachable during the configuration task
    remoteSearchConfigTries: 10
  # DAM Plugin Google Vision configurations
  damPluginGoogleVision:
    # Specifying 10 in maxResults will exactly return the same number of results, even though the Vision API might generate more than that
    maxResults: 25
    # The plugin would send back only the results which has confidence score more than or equal to the provided value
    confidencePercentage: 60
