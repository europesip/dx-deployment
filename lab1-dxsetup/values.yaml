    # If customReplicationSecret is not empty, replicationUser and replicationPassword should be an empty string. If both default credential and secret name are filled it will block the chart from being deployed.
    customReplicationSecret: ""
    # Credentials used by the Digital Asset Management to manage the release to release migration. The user name can begin with lowercase alphabets or underscore and can contain only lowercase alphabets, numbers, underscore or dollar sign with max length of 63 characters, and allows empty values if customDamSecret is specified. 
    # If damUser and/or damPassword is not empty, the customDamSecret below should be an empty string. If both default credential and secret name are filled it will block the chart from being deployed.
    damUser: "damuser"
    damPassword: "1234"
