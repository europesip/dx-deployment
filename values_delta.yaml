#********************************************************************
#* DELTA CONFIGURATION - HCL DX LAB (WebEngine / LVM+NFS / NodePort)*
#********************************************************************

# 1. IMÁGENES
images:
  # Repositorio interno de OpenShift
  repository: "image-registry.openshift-image-registry.svc:5000/openshift"
  
  # Corrección de nombres (dx/ -> dx-) por limitación del registry
  names:
    contentComposer: "dx-content-composer"
    core: "dx-core"
    damPluginGoogleVision: "dx-dam-plugin-google-vision"
    digitalAssetManagement: "dx-digital-asset-manager"
    imageProcessor: "dx-image-processor"
    openLdap: "dx-openldap"
    persistenceConnectionPool: "dx-persistence-connection-pool"
    persistenceNode: "dx-persistence-node"
    persistenceMetricsExporter: "dx-persistence-metrics-exporter"
    remoteSearch: "dx-remote-search"
    ringApi: "dx-ringapi"
    runtimeController: "dx-runtime-controller"
    loggingSidecar: "dx-logging-sidecar"
    haproxy: "dx-haproxy"
    damPluginKaltura: "dx-dam-plugin-kaltura"
    licenseManager: "dx-license-manager"
    prereqsChecker: "dx-prereqs-checker"
    webEngine: "dx-webengine"

# 2. RECURSOS (Reducidos para Workers de 12GB)
resources:
  core:
    requests: { cpu: "1000m", memory: "2560Mi" }
  digitalAssetManagement:
    requests: { cpu: "200m", memory: "768Mi" }
  imageProcessor:
    requests: { cpu: "100m", memory: "512Mi" }
    limits: { cpu: "500m", memory: "1024Mi" }
  persistenceNode:
    requests: { cpu: "500m", memory: "512Mi" }
  haproxy:
    requests: { cpu: "100m", memory: "200Mi" }
    limits: { cpu: "200m", memory: "300Mi" }
  webEngine:
    requests: { cpu: "1000m", memory: "2560Mi" }

# 3. VOLÚMENES (Estrategia LVM Rápido + NFS Compartido)
volumes:
  core:
    profile: { storageClassName: "nfs-rwx" }
    tranlog: { storageClassName: "lvms-lvm-sc-200g" }
    log: { storageClassName: "lvms-lvm-sc-200g" }
  digitalAssetManagement:
    binaries: { storageClassName: "nfs-rwx" }
  persistenceNode:
    database: { storageClassName: "lvms-lvm-sc-200g" }
  licenseManager:
    data: { storageClassName: "lvms-lvm-sc-200g" }
  openLdap:
    slapd: { storageClassName: "lvms-lvm-sc-200g" }
    certificate: { storageClassName: "lvms-lvm-sc-200g" }
    ldap: { storageClassName: "lvms-lvm-sc-200g" }
  remoteSearch:
    prsprofile: { storageClassName: "lvms-lvm-sc-200g" }
  webEngine:
    # [WORKAROUND] Usamos NFS (RWX) para evitar problemas de permisos con Derby/XFS
    customization: { storageClassName: "nfs-rwx" }
    log: { storageClassName: "nfs-rwx" }

# 4. APLICACIONES (WebEngine ON / Core OFF)
applications:
  core: false
  remoteSearch: false
  webEngine: true

# 5. NETWORKING (Hostname, NodePort y CORS)
networking:
  core:
    host: "dx.apps.promox.europesip-lab.com"
    cookieSameSiteAttribute: ""
    cspFrameAncestorsEnabled: false
  addon:
    host: "dx.apps.promox.europesip-lab.com"
    contentComposer:
      corsOrigin: ["https://dx.apps.promox.europesip-lab.com"]
      cspFrameAncestorsEnabled: false
    digitalAssetManagement:
      staging: { host: "dx.apps.promox.europesip-lab.com" }
      corsOrigin: ["https://dx.apps.promox.europesip-lab.com"]
      cspFrameAncestorsEnabled: false
    imageProcessor:
      corsOrigin: ["https://dx.apps.promox.europesip-lab.com"]
      cspFrameAncestorsEnabled: false
    ringApi:
      corsOrigin: ["https://dx.apps.promox.europesip-lab.com"]
      cspFrameAncestorsEnabled: false
    damPluginKaltura:
      corsOrigin: ["https://dx.apps.promox.europesip-lab.com"]
  haproxy:
    serviceType: "NodePort"
    servicePort: 30443
    strictTransportSecurity: { enabled: false }
  tlsCertSecret: "dx-tls-cert"
  webEngine:
    host: "dx.apps.promox.europesip-lab.com"
    cookieSameSiteAttribute: ""
    cspFrameAncestorsEnabled: false

# 6. SEGURIDAD & OTROS
security:
  webEngine:
    webEnginePassword: "wpspassword"

containerTimezone: "Europe/Madrid"
